version: 1
datasets:
- domain: eod
  source: fmp
  dataset: eod-bulk-price
  discriminator: ''
  ticker_scope: global
  silver_schema: silver
  silver_table: fmp_eod_bulk_price
  key_cols:
  - symbol
  - date
  row_date_col: date
  recipes:
  - plans:
    - basic
    data_source_path: eod-bulk
    query_vars:
      date: __to__
      datatype: csv
    date_key: date
    cadence_mode: interval
    min_age_days: 1
    run_days:
    - mon
    - tues
    - wed
    - thurs
    - fri
    help_url: https://site.financialmodelingprep.com/developer/docs#eod-bulk
  dto_schema:
    dto_type: sbfoundation.dtos.eod.eod_bulk_price_dto.EodBulkPriceDTO
    columns:
    - name: symbol
      type: str
      nullable: false
    - name: date
      type: date
      nullable: false
    - name: open
      type: float
      nullable: true
    - name: high
      type: float
      nullable: true
    - name: low
      type: float
      nullable: true
    - name: close
      type: float
      nullable: true
    - name: adj_close
      type: float
      nullable: true
    - name: volume
      type: int
      nullable: true
    - name: unadjusted_volume
      type: int
      nullable: true
    - name: change
      type: float
      nullable: true
    - name: change_pct
      type: float
      nullable: true
    - name: vwap
      type: float
      nullable: true
